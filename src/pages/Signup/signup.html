<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🐾 New Registration | WildLife Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-emerald-950 flex flex-col min-h-screen font-sans">
    <nav class="p-8">
        <a href="../../../index.html" class="text-white/60 font-black tracking-widest hover:text-white transition italic">← ABORT TO HOME</a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[4rem] shadow-2xl overflow-hidden max-w-5xl w-full flex flex-col md:flex-row-reverse min-h-[600px]">
            <div class="md:w-1/2 relative hidden md:block">
                <img src="https://images.unsplash.com/photo-1557008075-7f2c5efa4cfd?w=1000" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-emerald-900/30 backdrop-blur-[1px]"></div>
            </div>
            <div class="md:w-1/2 p-16 flex flex-col justify-center">
                <h2 class="text-5xl font-black text-slate-800 dark:text-white mb-2 leading-none uppercase tracking-tighter">Join The <br>Registry</h2>
                <p class="text-slate-400 mb-12 font-medium">Create your unique conservation keycode.</p>
                
                <form class="space-y-6">
                    <input type="text" placeholder="FULL LEGAL NAME" class="w-full p-5 rounded-3xl bg-slate-50 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-emerald-500 font-bold tracking-widest text-xs shadow-inner">
                    <input type="email" placeholder="OFFICIAL EMAIL" class="w-full p-5 rounded-3xl bg-slate-50 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-emerald-500 font-bold tracking-widest text-xs shadow-inner">
                    <input type="password" placeholder="SECURE KEYCODE" class="w-full p-5 rounded-3xl bg-slate-50 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-emerald-500 font-bold tracking-widest text-xs shadow-inner">
                    <button class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-black shadow-2xl hover:bg-emerald-700 transition tracking-[0.3em]">INITIATE ACCOUNT</button>
                </form>

                <p class="mt-12 text-center text-slate-400 font-bold text-xs tracking-widest uppercase">
                    Already Registered? 
                    <a href="../Sign%20in/signin.html" class="text-emerald-500 hover:underline">Access Portal</a>
                </p>
            </div>
        </div>
    </main>
    <script src="../../constants/themeConstants.js"></script>
</body>
</html>
